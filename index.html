<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080C18;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
body{overscroll-behavior:none;-webkit-overflow-scrolling:touch;color:#E8EDF5}
::-webkit-scrollbar{display:none}
input,select,button,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fi{animation:fi .22s ease both}
.pulse{animation:pulse 2s infinite}
.mono{font-family:'Courier New',Courier,monospace;letter-spacing:-.5px}
#app{height:100dvh;max-width:430px;margin:0 auto;background:#080C18;position:relative;overflow:hidden;display:flex;flex-direction:column}
.card{background:#0D1526;border:1px solid #1A2640;border-radius:18px;padding:15px}
.scr{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
/* inputs */
.inp{background:#111827;border:1.5px solid #1F2D45;color:#E8EDF5;border-radius:11px;padding:10px 12px;font-size:14px;width:100%;outline:none}
.inp:focus{border-color:#6366F1}
select.inp option{background:#111827}
label{font-size:11px;font-weight:700;color:#64748B;margin-bottom:5px;display:block;letter-spacing:.6px;text-transform:uppercase}
/* buttons */
.btn{background:linear-gradient(135deg,#6366F1,#4F46E5);border:none;color:#fff;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;display:block}
.btn:active{opacity:.82}
.btn-r{background:linear-gradient(135deg,#EF4444,#DC2626)!important}
.btn2{background:#111827;border:1.5px solid #1F2D45;color:#94A3B8;border-radius:11px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%;text-align:center}
/* nav */
.navbtn{flex:1;background:none;border:none;color:#475569;cursor:pointer;padding:9px 0 5px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;letter-spacing:.4px;transition:color .2s}
.navbtn.on{color:#6366F1}
/* seg */
.seg{display:flex;background:#0D1526;border:1px solid #1A2640;border-radius:12px;padding:3px;gap:3px}
.seg-b{flex:1;border:none;border-radius:9px;padding:6px 3px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s}
.seg-b.on{background:#6366F1;color:#fff}
.seg-b.off{background:transparent;color:#475569}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.sh{font-size:11px;color:#64748B;letter-spacing:.8px;font-weight:800;margin-bottom:9px;margin-top:5px;text-transform:uppercase}
/* overlay */
.ov-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.ov-box{background:#0D1526;border-radius:22px 22px 0 0;padding:20px 16px 40px;width:100%;max-width:430px;border:1px solid #1A2640;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:su .32s cubic-bezier(.22,1,.36,1)}
/* toggle */
.tgl{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.tgl-k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
/* fab */
#fab{position:fixed;bottom:80px;right:calc(50% - 215px + 14px);width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#4F46E5);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;z-index:50}
/* pin */
.pin-grid{display:grid;grid-template-columns:repeat(3,68px);gap:10px;margin-top:4px}
.pin-btn{width:68px;height:68px;border-radius:14px;font-size:22px;font-weight:700;cursor:pointer;border:1px solid #1F2D45;background:#111827;color:#E8EDF5}
.pin-btn.empty{background:transparent;border:none}
.pin-btn.del{color:#EF4444}
</style>

function fmtS(n,cid){var c=CURRS.find(function(x){return x.id===cid;})||CURRS[0];var a=Math.abs(n);return (n<0?'-':'')+c.sym+(a>=1000?(a/1000).toFixed(1)+'k':a.toFixed(0));}

/* ═══════════════════════════════════════════════════
   MINI REACTIVE ENGINE
   - Each "signal" stores a value + subscribers
   - update() re-renders only the root component
   ═══════════════════════════════════════════════════ */
var _renderQueued=false;
var _root=null;

function scheduleRender(){
  if(_renderQueued)return;
  _renderQueued=true;
  requestAnimationFrame(function(){_renderQueued=false;if(_root)_root.rerender();});
}

function signal(init){
  var _v=init;
  var _subs=[];
  return {
    get:function(){return _v;},
    set:function(fn){
      var next=typeof fn==='function'?fn(_v):fn;
      if(next!==_v){_v=next;ls_set.pending&&ls_set.pending(next);scheduleRender();}
    },
    peek:function(){return _v;}
  };
}

/* ═══════════════════════════════════════════════════
   DOM BUILDER — h(tag, props, ...children)
   ═══════════════════════════════════════════════════ */
function h(tag,props){
  var children=Array.prototype.slice.call(arguments,2);
  if(typeof tag==='function'){
    var allProps=Object.assign({},props||{});
    allProps.children=children.flat(10);
    return tag(allProps);
  }
  var el=document.createElement(tag);
  if(props){
    Object.keys(props).forEach(function(k){
      if(k==='style'){if(typeof props[k]==='object')Object.assign(el.style,props[k]);else el.style.cssText=props[k];}
      else if(k==='className')el.className=props[k];
      else if(k==='htmlFor')el.htmlFor=props[k];
      else if(k.startsWith('on')&&typeof props[k]==='function')el.addEventListener(k.slice(2).toLowerCase(),props[k]);
      else if(k==='checked')el.checked=props[k];
      else if(k==='value'){el.value=props[k];}
      else if(k==='disabled'){if(props[k])el.setAttribute('disabled','');}
      else if(typeof props[k]!=='object'&&props[k]!==false&&props[k]!==null&&props[k]!==undefined)el.setAttribute(k,props[k]);
    });
  }
  append(el,children);
  return el;
}
function append(el,children){
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c===null||c===undefined||c===false||c==='')return;
    if(Array.isArray(c)){append(el,c);return;}
    if(c instanceof Node)el.appendChild(c);
    else el.appendChild(document.createTextNode(String(c)));
  });
}
function frag(){return Array.prototype.slice.call(arguments).reduce(function(f,c){if(c)f.appendChild(c instanceof Node?c:document.createTextNode(String(c)));return f;},document.createDocumentFragment());}

function derived(){
  var T=TX[S.ucfg.lang]||TX.pt;
  var CURR=CURRS.find(function(c){return c.id===S.ucfg.currency;})||CURRS[0];
  var fmt=function(n){return fmtC(n,S.ucfg.lang,S.ucfg.currency);};
  var mTxs=S.txs.filter(function(t){return t.date.startsWith(S.selMon);});
  var income=mTxs.filter(function(t){return t.type==='income'&&t.status==='paid';}).reduce(function(a,t){return a+t.amount;},0);
  var expenses=mTxs.filter(function(t){return t.type==='expense'&&t.status==='paid';}).reduce(function(a,t){return a+t.amount;},0);
  var pendAll=S.txs.filter(function(t){return t.status==='pending'&&t.type==='expense';});
  var totPend=pendAll.reduce(function(a,t){return a+t.amount;},0);
  var overdue=pendAll.filter(function(t){return ddiff(t.dueDate)<0;});
  var dueSoon=pendAll.filter(function(t){var d=ddiff(t.dueDate);return d>=0&&d<=3;});
  var totAssets=S.accs.filter(function(a){return a.includeInTotal;}).reduce(function(s,a){return s+a.balance;},0);
  var histMons=ALL_MONTHS.map(function(ym){
    var bh=S.balH[ym];
    var bal;
    if(bh&&bh.adjusted&&bh.manual!==null){bal=bh.manual;}
    else{var t=S.txs.filter(function(x){return x.date.startsWith(ym);});bal=t.filter(function(x){return x.type==='income'&&x.status==='paid';}).reduce(function(a,x){return a+x.amount;},0)-t.filter(function(x){return x.type==='expense'&&x.status==='paid';}).reduce(function(a,x){return a+x.amount;},0);}
    return{ym:ym,label:MONTHS[parseInt(ym.split('-')[1])-1]+'/'+ym.slice(2,4),balance:bal,adjusted:bh&&bh.adjusted};
  });
  var filtTx=S.txs.filter(function(t){return t.date.startsWith(S.selMon);}).filter(function(t){return S.fAcc==='all'||t.accountId===S.fAcc;}).filter(function(t){return S.fStatus==='all'||t.status===S.fStatus;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  return{T:T,CURR:CURR,fmt:fmt,income:income,expenses:expenses,pendAll:pendAll,totPend:totPend,overdue:overdue,dueSoon:dueSoon,totAssets:totAssets,histMons:histMons,filtTx:filtTx};
}

function addTx(){
  var f=S.form;if(!f.desc||!f.amount)return;
  var toAdd=[];

    var sid='s_'+uid();
    for(var i=0;i<f.installCount;i++){
      var dd=new Date(f.dueDate+'T12:00:00');dd.setMonth(dd.getMonth()+i);
      var dds=dd.toISOString().slice(0,10);
      var item=Object.assign({},f,{id:uid(),amount:parseFloat(f.amount),installments:false,recurrent:false,seriesId:sid,desc:f.desc+' ('+(i+1)+'/'+f.installCount+')',date:i===0?f.date:dds,dueDate:dds});
      toAdd.push(item);

  } else {
    var sid2=f.recurrent?'s_'+uid():undefined;
    toAdd.push(Object.assign({},f,{amount:parseFloat(f.amount),id:uid(),seriesId:sid2}));
  }
  S.txs=toAdd.concat(S.txs);save('txs');
  S.modal=null;

  function renderDots(){dots.innerHTML='';for(var i=0;i<4;i++){var d=document.createElement('div');d.style.cssText='width:16px;height:16px;border-radius:50%;transition:background .2s;';d.style.background=pinVal.length>i?'#6366F1':'#1F2D45';dots.appendChild(d);}}
