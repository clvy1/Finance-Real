const INIT_HIST={"2026-02":{adjusted:false,manual:null},"2026-03":{adjusted:false,manual:null},"2026-04":{adjusted:false,manual:null}};

function buildMonthsForYear(year){const ms=[];for(let m=1;m<=12;m++)ms.push(`${year}-${String(m).padStart(2,"0")}`);return ms;}

function useLS(key,init){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem("fr5_"+key);return s?JSON.parse(s):init;}catch{return init;}});
  const set=useCallback(fn=>{setV(prev=>{const next=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem("fr5_"+key,JSON.stringify(next));}catch{}return next;});},[key]);
  return[v,set];
}
const ts=()=>{const n=new Date();return`${n.getFullYear()}${String(n.getMonth()+1).padStart(2,"0")}${String(n.getDate()).padStart(2,"0")}_${String(n.getHours()).padStart(2,"0")}${String(n.getMinutes()).padStart(2,"0")}`;};

/* \u2550\u2550 MAIN APP \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function App(){
  const[txs,setTxs]=useLS("tx",INIT_TX);
  const[accs,setAccs]=useLS("accs",INIT_ACCS);
  const[balH,setBalH]=useLS("bh",INIT_HIST);
  const[userCfg,setUser]=useLS("ucfg",{lang:"pt",currency:"BRL",tipsEnabled:true});
  const[customCats,setCustomCats]=useLS("cats",[]);

  const[tab,setTab]=useState("home");
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);
  const[selMon,setSelMon]=useState("2026-04");
  const[selYear,setSelYear]=useState(TODAY_YEAR);
  const[fAcc,setFAcc]=useState("all");
  const[fStatus,setFStatus]=useState("all");
  const[detTx,setDetTx]=useState(null);
  const[showHist,setShowHist]=useState(false);
  const[editBM,setEditBM]=useState(null);
  const[tmpBal,setTmpBal]=useState("");
  const[editAccId,setEditAccId]=useState(null);
  const[accRealBal,setAccRealBal]=useState("");
  const[accAdjNote,setAccAdjNote]=useState("");
  const[accDeleteFutureMode,setAccDeleteFutureMode]=useState("transfer");
  const[accDeleteTargetId,setAccDeleteTargetId]=useState("");
  const[accDeleteBalanceMode,setAccDeleteBalanceMode]=useState("transfer");
  const[accDeleteBalanceTargetId,setAccDeleteBalanceTargetId]=useState("");
  const[deferPmt,setDeferPmt]=useState(null);
  const[showTip,setShowTip]=useState(false);
  const[catEditId,setCatEditId]=useState(null);
  const[catForm,setCatForm]=useState({name:"",icon:"\ud83d\udce6",color:"#F0A500",txType:"both"});
  const[catEditName,setCatEditName]=useState("");
  const[trForm,setTrForm]=useState({desc:"",amount:"",fromAccountId:"",toAccountId:"",date:TODAY,status:"paid"});

  // Edit modal state
  const[editTx,setEditTx]=useState(null); // tx being edited
  const[editForm,setEditForm]=useState(null);

  // Delete series modal
  const[delTxTarget,setDelTxTarget]=useState(null);
  const[delMode,setDelMode]=useState(null); // "only"|"thisAndFuture"|"all"

  const fileRef=useRef(null);
  const currentYM=TODAY.slice(0,7);

  const T=I18N[userCfg.lang]||I18N.pt;
  const CURR=CURRENCIES.find(c=>c.id===userCfg.currency)||CURRENCIES[0];
  const XT=EXTRA_T[userCfg.lang]||EXTRA_T.en;
  const allCats=useMemo(()=>[...DEFAULT_CATS,...(customCats||[])],[customCats]);

  useEffect(()=>{setAccs(prev=>{const next=(prev||[]).map(normalizeAccount);return JSON.stringify(prev)===JSON.stringify(next)?prev:next;});});
  useEffect(()=>{const y=parseInt(selMon.slice(0,4));if(!isNaN(y)&&y!==selYear)setSelYear(y);},[selMon]);
  useEffect(()=>{const h=e=>{e.preventDefault();setDeferPmt(e);};window.addEventListener("beforeinstallprompt",h);return()=>window.removeEventListener("beforeinstallprompt",h);},[]);
  useEffect(()=>{if(userCfg.tipsEnabled)setShowTip(true);},[]);

  const ALL_MONTHS=useMemo(()=>buildMonthsForYear(selYear),[selYear]);

  const accBalanceById=useMemo(()=>Object.fromEntries((accs||[]).map(a=>{
    const acc=normalizeAccount(a);
    const delta=(txs||[]).filter(t=>t.accountId===acc.id&&t.status==="paid").reduce((s,t)=>{
      if(t.type==="income"||t.type==="transfer_in")return s+t.amount;
      if(t.type==="expense"||t.type==="transfer_out")return s-t.amount;
      return s;
    },0);
    return[acc.id,round2(acc.openingBalance+delta)];
  })),[accs,txs]);
  const getAccBal=useCallback(id=>accBalanceById[id]??0,[accBalanceById]);
  const typeLabel=useCallback(type=>{if(type==="checking")return T.checking;if(type==="savings")return T.savings;if(type==="credit")return T.credit;return XT.wallet;},[T,XT]);
  const getTxAccountMeta=useCallback(t=>{const acc=(accs||[]).find(a=>a.id===t.accountId);if(acc)return{name:acc.name,icon:acc.icon,color:acc.color};if(t?.accountNameSnapshot||t?.accountRemoved)return{name:t.accountNameSnapshot||XT.removedAccountLabel,icon:t.accountIconSnapshot||"\ud83d\uddc3\ufe0f",color:t.accountColorSnapshot||"#64748B",removed:true};return null;},[accs,XT]);

  const fmtC=useCallback(n=>{try{const locale={pt:"pt-BR",en:"en-US",es:"es-ES",fr:"fr-FR",de:"de-DE",it:"it-IT",zh:"zh-CN"}[userCfg.lang]||"pt-BR";return n.toLocaleString(locale,{style:"currency",currency:userCfg.currency});}catch{return CURR.symbol+" "+Math.abs(n).toFixed(2);}},[userCfg.lang,userCfg.currency]);

  const toast_=useCallback((msg,color="#10B981")=>{setToast({msg,color});setTimeout(()=>setToast(null),2600);},[]);
  const switchTab=useCallback(next=>{setModal(null);setTab(next);},[]);

  /* \u2500\u2500 PROJECTIONS FOR FUTURE MONTHS \u2500\u2500 */
  // \u2705 FIX 4: income recurrents now included in future projections
  const getMonBal=useCallback(ym=>{
    const h=balH[ym];
    if(h?.adjusted&&h?.manual!==null)return h.manual;
    const isFutureMonth=ym>currentYM;
    if(!isFutureMonth){
      const t=txs.filter(x=>x.date.startsWith(ym));
      return t.filter(x=>(x.type==="income")&&x.status==="paid").reduce((a,x)=>a+x.amount,0)
            -t.filter(x=>(x.type==="expense")&&x.status==="paid").reduce((a,x)=>a+x.amount,0);
    }
    // Future month: project recurring transactions (BOTH income AND expense)
    const[yy,mm]=ym.split("-").map(Number);
    let projected=0;
    (txs||[]).forEach(t=>{
      if(t.type==="transfer_in"||t.type==="transfer_out")return;
      if(!t.recurrent)return;
      if(t.recurrence==="monthly"){
        const tYM=t.date.slice(0,7);
        if(tYM<ym){
          if(t.type==="income")projected+=t.amount;
          if(t.type==="expense")projected-=t.amount;
        }
      } else if(t.recurrence==="yearly"){
        const tDate=new Date(t.date+"T12:00:00");
        const sameMonth=String(tDate.getMonth()+1).padStart(2,"0")===String(mm).padStart(2,"0");
        if(sameMonth&&tDate.getFullYear()<=yy){
          if(t.type==="income")projected+=t.amount;
          if(t.type==="expense")projected-=t.amount;
        }
      }
    });
    // Also add non-recurring transactions explicitly dated in this future month
    (txs||[]).filter(x=>x.date.startsWith(ym)&&!x.recurrent).forEach(x=>{
      if(x.type==="income")projected+=x.amount;
      if(x.type==="expense")projected-=x.amount;
    });
    return round2(projected);
  },[balH,txs,currentYM]);

  // \u2705 FIX 4: projected txs for future months now include income recurrents
  const projectedTxsForFuture=useMemo(()=>{
    if(selMon<=currentYM)return[];
    const[yy,mm]=selMon.split("-").map(Number);
    const projected=[];
    (txs||[]).forEach(t=>{
      if(!t.recurrent||t.type==="transfer_in"||t.type==="transfer_out")return;
      if(t.recurrence==="monthly"){
        const tYM=t.date.slice(0,7);
        if(tYM<selMon){
          const day=t.date.slice(8,10);
          projected.push({...t,id:`proj_${t.id}_${selMon}`,date:`${selMon}-${day}`,dueDate:`${selMon}-${day}`,status:"pending",_isProjection:true});
        }
      } else if(t.recurrence==="yearly"){
        const tDate=new Date(t.date+"T12:00:00");
        const sameMonth=String(tDate.getMonth()+1).padStart(2,"0")===String(mm).padStart(2,"0");
        if(sameMonth&&tDate.getFullYear()<=yy){
          projected.push({...t,id:`proj_${t.id}_${selMon}`,date:`${selMon}-${String(tDate.getDate()).padStart(2,"0")}`,dueDate:`${selMon}-${String(tDate.getDate()).padStart(2,"0")}`,status:"pending",_isProjection:true});
        }
      }
    });
    return projected;
  },[selMon,txs,currentYM]);

  const mTxs=txs.filter(t=>t.date.startsWith(selMon));
  const income=mTxs.filter(t=>t.type==="income"&&t.status==="paid").reduce((a,t)=>a+t.amount,0);
  const expenses=mTxs.filter(t=>t.type==="expense"&&t.status==="paid").reduce((a,t)=>a+t.amount,0);
  const pending=txs.filter(t=>t.status==="pending"&&t.type==="expense");
  const totPend=pending.reduce((a,t)=>a+t.amount,0);
  const overdue=pending.filter(t=>ddiff(t.dueDate)<0);
  const dueSoon=pending.filter(t=>{const d=ddiff(t.dueDate);return d>=0&&d<=3;});
  const totAssets=accs.filter(a=>a.includeInTotal).reduce((s,a)=>s+getAccBal(a.id),0);

  const histMons=ALL_MONTHS.map(ym=>({ym,label:MONTHS_BASE[parseInt(ym.split("-")[1])-1]+"/"+ym.slice(2,4),balance:getMonBal(ym),adjusted:balH[ym]?.adjusted,isFuture:ym>currentYM}));

  const filtTx=[
    ...(selMon>currentYM?projectedTxsForFuture:[]),
    ...txs.filter(t=>t.date.startsWith(selMon)),
  ].filter(t=>fAcc==="all"||t.accountId===fAcc).filter(t=>fStatus==="all"||t.status===fStatus).sort((a,b)=>b.date.localeCompare(a.date));

  /* \u2500\u2500 TX FORM \u2500\u2500 */
  const blankF={desc:"",amount:"",type:"expense",cat:"food",date:TODAY,dueDate:TODAY,status:"pending",accountId:accs[0]?.id||"acc1",recurrent:false,recurrence:"monthly",installments:false,installCount:2,installmentTotal:"",scheduled:false,scheduledDate:TODAY};
  const[form,setForm]=useState(blankF);
  const formCats=useMemo(()=>allCats.filter(c=>c.txType==="both"||(form.type==="income"?c.txType==="income":c.txType==="expense")),[allCats,form.type]);

  useEffect(()=>{if(!formCats.length)return;const ok=formCats.some(c=>c.id===form.cat);if(!ok)setForm(f=>({...f,cat:formCats[0].id}));},[form.type,allCats]);

  // \u2705 FIX 1: first installment uses the exact dueDate, subsequent months increment
  const addTx=()=>{
    if(!form.desc||!form.amount)return;
    const toAdd=[];
    if(form.installments&&form.installCount>=2){
      const totalVal=parseFloat(form.installmentTotal||form.amount)||0;
      const parcelVal=round2(totalVal/form.installCount);
      const seriesId="s_"+uid();
      for(let i=0;i<form.installCount;i++){
        // \u2705 FIX 1: first parcel on exact dueDate, then +1 month each
        const dDate=new Date(form.dueDate+"T12:00:00");
        dDate.setMonth(dDate.getMonth()+i);
        const dd=dDate.toISOString().slice(0,10);
        toAdd.push({...form,id:uid(),amount:parcelVal,installments:false,recurrent:false,
          desc:`${form.desc} (${i+1}/${form.installCount})`,
          date:i===0?form.date:dd, // keep original date for first
          dueDate:dd, // \u2705 first parcel = exact dueDate
          seriesId,
          installmentIndex:i+1,
          installmentTotal:form.installCount,
        });
      }
    } else {
      const seriesId=form.recurrent?"s_"+uid():undefined;
      toAdd.push({...form,amount:parseFloat(form.amount),id:uid(),seriesId});
    }
    setTxs(p=>[...toAdd,...p]);setModal(null);setForm(blankF);
    toast_(toAdd.length>1?T.parcelsAdded.replace("{n}",toAdd.length):T.txAdded);
  };

  /* \u2500\u2500 TRANSFER \u2500\u2500 */
  const addTransfer=()=>{
    if((accs||[]).length<2){toast_("Cadastre ao menos duas contas","#EF4444");return;}
    if(!trForm.amount||parseFloat(trForm.amount)<=0){toast_("Informe um valor v\u00e1lido","#EF4444");return;}
    if(!trForm.fromAccountId||!trForm.toAccountId){toast_("Selecione as contas","#EF4444");return;}
    if(trForm.fromAccountId===trForm.toAccountId){toast_(T.sameAccountErr,"#EF4444");return;}
    const amt=parseFloat(trForm.amount);
    const desc=trForm.desc.trim()||"Transfer\u00eancia";
    const fromAcc=(accs||[]).find(a=>a.id===trForm.fromAccountId);
    const toAcc=(accs||[]).find(a=>a.id===trForm.toAccountId);
    const pairId=uid();
    setTxs(p=>[
      {id:uid(),desc:`${desc} \u2192 ${toAcc?.name||""}`,amount:amt,type:"transfer_out",cat:"transfer",date:trForm.date,status:trForm.status,accountId:trForm.fromAccountId,recurrent:false,dueDate:trForm.date,transferPairId:pairId},
      {id:uid(),desc:`${desc} \u2190 ${fromAcc?.name||""}`,amount:amt,type:"transfer_in",cat:"transfer",date:trForm.date,status:trForm.status,accountId:trForm.toAccountId,recurrent:false,dueDate:trForm.date,transferPairId:pairId},
      ...p
    ]);
    setModal(null);setTrForm({desc:"",amount:"",fromAccountId:accs[0]?.id||"",toAccountId:accs[1]?.id||"",date:TODAY,status:"paid"});
    toast_(T.transferAdded);
  };

  /* \u2500\u2500 MARK PAID \u2500\u2500 */
  const markPaid=id=>{setTxs(p=>{const tx=p.find(t=>t.id===id);if(!tx)return p;const pairId=tx.transferPairId;return p.map(t=>t.id===id||(pairId&&t.transferPairId===pairId)?{...t,status:"paid"}:t);});toast_(T.paidOk);};

  /* \u2500\u2500 \u2705 FIX 2: EDIT TX \u2500\u2500 */
  const openEditTx=tx=>{
    setEditTx(tx);
    setEditForm({
      desc:tx.desc,amount:String(tx.amount),type:tx.type,cat:tx.cat,
      date:tx.date,dueDate:tx.dueDate||tx.date,status:tx.status,
      accountId:tx.accountId,recurrent:tx.recurrent,recurrence:tx.recurrence||"monthly",
    });
    setModal("editTx");
  };

  const saveEditTx=()=>{
    if(!editForm||!editTx)return;
    const newAmt=parseFloat(editForm.amount)||0;
    setTxs(p=>p.map(t=>{
      if(t.id!==editTx.id)return t;
      return{...t,...editForm,amount:newAmt};
    }));
    setModal(null);setEditTx(null);setEditForm(null);
    toast_(T.editTxSaved);
  };

  const editFormCats=useMemo(()=>{
    if(!editForm)return allCats;
    return allCats.filter(c=>c.txType==="both"||(editForm.type==="income"?c.txType==="income":c.txType==="expense"));
  },[allCats,editForm]);

  /* \u2500\u2500 \u2705 FIX 3: DELETE WITH SERIES OPTIONS \u2500\u2500 */
  const openDeleteTx=tx=>{
    setDelTxTarget(tx);
    // Check if it has a seriesId with multiple members
    const seriesCount=tx.seriesId?(txs||[]).filter(t=>t.seriesId===tx.seriesId).length:0;
    if(tx.seriesId&&seriesCount>1){
      setDelMode(null);// Show modal to choose
      setModal("deleteSeries");
    } else {
      // Single tx \u2014 delete immediately
      execDeleteTx(tx,"only");
    }
  };

  const execDeleteTx=(tx,mode)=>{
    if(!tx)return;
    setTxs(p=>{
      if(!tx.seriesId||mode==="only"){
        // Also remove transfer pair
        const pairId=tx.transferPairId;
        return p.filter(t=>!(t.id===tx.id||(pairId&&t.transferPairId===pairId)));
      }
      if(mode==="all"){
        return p.filter(t=>t.seriesId!==tx.seriesId);
      }
      if(mode==="thisAndFuture"){
        // Remove this and all series members with date >= this tx's date
        return p.filter(t=>{

          return t.date<tx.date; // keep past ones
        });
      }
      return p;
    });

  /* \u2500\u2500 ACCOUNT MANAGEMENT \u2500\u2500 */
  const openAccAdjust=id=>{const others=(accs||[]).filter(a=>a.id!==id);const firstOther=others[0]?.id||"";setEditAccId(id);setAccRealBal(String(getAccBal(id)));setAccAdjNote("");setAccDeleteFutureMode("transfer");setAccDeleteTargetId(firstOther);setAccDeleteBalanceMode("transfer");setAccDeleteBalanceTargetId(firstOther);setModal("accAdj");};
  const saveAccAdjustmentTx=()=>{const real=parseFloat(accRealBal);if(isNaN(real)||!editAccId)return;const diff=round2(real-getAccBal(editAccId));if(Math.abs(diff)<0.005){toast_(XT.noDifference,"#F59E0B");return;}setTxs(p=>[{id:uid(),desc:accAdjNote.trim()||XT.adjustmentAutoDesc||"Ajuste",amount:Math.abs(diff),type:diff>=0?"income":"expense",cat:"adjustment",date:TODAY,status:"paid",accountId:editAccId,recurrent:false,dueDate:TODAY},...p]);setModal(null);toast_(XT.adjustmentCreated,"#8B5CF6");};
  const saveAccBaseCorrection=()=>{const real=parseFloat(accRealBal);if(isNaN(real)||!editAccId)return;const diff=round2(real-getAccBal(editAccId));if(Math.abs(diff)<0.005){toast_(XT.noDifference,"#F59E0B");return;}setAccs(p=>p.map(a=>a.id===editAccId?{...normalizeAccount(a),openingBalance:round2(normalizeAccount(a).openingBalance+diff)}:a));setModal(null);toast_(XT.baseCorrected,"#3B82F6");};
  const deleteAccountAndReconcile=()=>{if(!editAccId)return;if((accs||[]).length<=1){toast_(XT.cannotDeleteLastAccount,"#EF4444");return;}const acc=(accs||[]).find(a=>a.id===editAccId);if(!acc)return;if(accDeleteFutureMode==="transfer"&&!accDeleteTargetId){toast_(XT.deleteNeedsTarget,"#EF4444");return;}if(accDeleteBalanceMode==="transfer"&&!accDeleteBalanceTargetId){toast_(XT.deleteNeedsTarget,"#EF4444");return;}const currentBalance=round2(getAccBal(editAccId));setTxs(prev=>{let next=[];for(const t of(prev||[])){if(t.accountId!==editAccId){next.push(t);continue;}const isFuturePending=t.status==="pending"&&(t.dueDate||TODAY)>=TODAY;if(isFuturePending){if(accDeleteFutureMode==="delete")continue;next.push({...t,accountId:accDeleteTargetId});continue;}next.push({...t,accountId:null,accountRemoved:true,accountNameSnapshot:acc.name,accountIconSnapshot:acc.icon,accountColorSnapshot:acc.color});}if(accDeleteBalanceMode==="transfer"&&accDeleteBalanceTargetId&&Math.abs(currentBalance)>=0.005){next=[{id:uid(),desc:`${XT.closingTransferDesc||"Encerramento"}: ${acc.name}`,amount:Math.abs(currentBalance),type:currentBalance>=0?"income":"expense",cat:"adjustment",date:TODAY,status:"paid",accountId:accDeleteBalanceTargetId,recurrent:false,dueDate:TODAY},...next];}return next;});setAccs(prev=>(prev||[]).filter(a=>a.id!==editAccId));setModal(null);toast_(XT.accountDeleted||"Conta exclu\u00edda \u2713","#EF4444");};

  const saveBal=()=>{const v=parseFloat(tmpBal);if(isNaN(v))return;setBalH(p=>({...p,[editBM]:{adjusted:true,manual:v}}));setModal(null);toast_(T.adjSaved);};

  /* \u2500\u2500 BACKUP \u2500\u2500 */
  const doBackupDownload=()=>{const data={transactions:txs,accounts:accs,balanceHistory:balH,userConfig:userCfg,customCategories:customCats,backupMeta:{exportedAt:new Date().toISOString(),version:"5.0",app:"Finance Real"}};const b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`FinanceRealBackup_${ts()}.json`;a.click();URL.revokeObjectURL(u);toast_(T.backupOk,"#3B82F6");};
  const handleFile=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!data.transactions||!data.accounts)throw new Error("invalid");setTxs(data.transactions||[]);setAccs(data.accounts||[]);if(data.balanceHistory)setBalH(data.balanceHistory);if(data.customCategories)setCustomCats(data.customCategories);toast_("Dados restaurados \u2713");}catch{toast_("Arquivo inv\u00e1lido","#EF4444");}};r.readAsText(file);e.target.value="";};

              const projInc=projectedTxsForFuture.filter(t=>t.type==="income").reduce((a,t
