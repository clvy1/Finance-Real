function ddiff(d){return Math.ceil((new Date(d)-new Date(TODAY))/86400000);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function pad2(n){return String(n).padStart(2,'0');}
function ts(){var n=new Date();return n.getFullYear()+pad2(n.getMonth()+1)+pad2(n.getDate())+'_'+pad2(n.getHours())+pad2(n.getMinutes());}
function fmtC(n,lang,cid){
  try{
    var lm={pt:'pt-BR',en:'en-US',es:'es-ES',fr:'fr-FR',de:'de-DE',it:'it-IT',zh:'zh-CN'};
    return n.toLocaleString(lm[lang]||'pt-BR',{style:'currency',currency:cid});
  }catch(e){
    var c=CURRS.find(function(x){return x.id===cid;})||CURRS[0];
    return c.sym+' '+Math.abs(n).toFixed(2);
  }
}
function fmtS(n,cid){
  var c=CURRS.find(function(x){return x.id===cid;})||CURRS[0];
  var a=Math.abs(n),s=n<0?'-':'';
  return a>=1000?s+c.sym+(a/1000).toFixed(1)+'k':s+c.sym+a.toFixed(0);
}

/* ── localStorage wrapper ────────────────────────────── */
function useLS(key,init){
  var full='fr5_'+key;
  var pair=useState(function(){
    try{var v=localStorage.getItem(full);return v?JSON.parse(v):init;}
    catch(e){return init;}
  });
  var val=pair[0],setVal=pair[1];
  var set=useCallback(function(fn){
    setVal(function(prev){
      var next=typeof fn==='function'?fn(prev):fn;
      try{localStorage.setItem(full,JSON.stringify(next));}catch(e){}
      return next;
    });
  },[full]);
  return [val,set];
}

  function execDelete(tx,mode){
    if(!tx)return;
    setTxs(function(p){
      if(!tx.seriesId||mode==='only'){
        var pid=tx.transferPairId;
        return p.filter(function(t){return !(t.id===tx.id||(pid&&t.transferPairId===pid));});
      }
      if(mode==='all')return p.filter(function(t){return t.seriesId!==tx.seriesId;});
      if(mode==='thisAndFuture'){
        return p.filter(function(t){
          if(t.seriesId!==tx.seriesId)return true;
          return t.date<tx.date;
        });
      }
      return p;
    });
    setModal(null);setDetTx(null);setDelTxTgt(null);
    toast(T.removed,'#EF4444');
